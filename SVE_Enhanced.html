const fmtMi = m => m ? Number(m).toLocaleString()+' mi' : '—';

const getWk = d => { const dt=new Date(d),fd=new Date(dt.getFullYear(),0,1); return Math.ceil(((dt-fd)/864e5+fd.getDay()+1)/7); };
const getStatus = v => {
  if(v.status==='sold') return {l:'SOLD',c:'#c9a557'};
  if(v.status==='expired'||new Date(v.expirationDate)<new Date()) return {l:'EXPIRED',c:'#888'};
  return {l:'ACTIVE',c:'#2d8a4e'};
};

// REGISTER
function RegisterPage({setVehicles,nav}) {
  const blank={vehicleType:'',year:'',make:'',makeOther:'',model:'',modelOther:'',vin:'',trim:'',miles:'',price:'',description:'',openDoors:false,openHood:false,okayToCall:false,okayToText:false,contactName:'',contactPhone:'',contactEmail:'',registrationType:'single'};
  const [form,setForm]=useState(blank);
  const [done,setDone]=useState(null);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const wc=form.description.trim()===''?0:form.description.trim().split(/\s+/).length;
  const avModels=useMemo(()=>{
    if(!form.make||form.make==='-- Select Make --') return ['-- Select Make First --'];
    if(form.make==='Other') return ['Other'];
    return ['-- Select Model --',...(MM[form.make]||['Other'])];
  },[form.make]);
  const handleDesc=e=>{const t=e.target.value;if(t.trim()===''||t.trim().split(/\s+/).length<=500)set('description',t)};
  const handleMake=val=>setForm(f=>({...f,make:val,makeOther:'',model:'',modelOther:''}));
  const doSticker=v=>printSticker(v,getStatus,fmt$,fmtMi,fmtD);
  const handleSubmit=e=>{
    e.preventDefault();
    const finalMake=form.make==='Other'?form.makeOther:form.make;
    const finalModel=form.model==='Other'?form.modelOther:form.model;
    const rd=new Date().toISOString();
    const ed=form.registrationType==='single'
      ?(()=>{const d=new Date();const dy=(5-d.getDay()+7)%7;d.setDate(d.getDate()+(dy||7));d.setHours(23,59,59,999);return d.toISOString()})()
      :(()=>{const d=new Date();d.setDate(d.getDate()+90);return d.toISOString()})();
    const v={...form,make:finalMake,model:finalModel,id:Date.now(),regNumber:genReg(),registrationDate:rd,expirationDate:ed,weekNumber:getWk(rd),status:'active',miles:Number(form.miles),price:Number(form.price)};
    setVehicles(p=>[...p,v]);setDone(v);setForm(blank);
    setTimeout(()=>doSticker(v),600);
  };
  const sel={...s.input,cursor:'pointer'};
  if(done) return (
    <div style={{maxWidth:'600px',margin:'60px auto',padding:'0 24px'}}>
      <div style={{...s.card,textAlign:'center',padding:'44px'}}>

        <p style={{color:'#666',fontSize:'13px',marginBottom:'20px',lineHeight:1.6}}>{done.year} {done.make} {done.model} &bull; Expires {fmtD(done.expirationDate)}</p>
        <div style={{background:'#f0faf4',border:'1px solid #c3e6cb',borderRadius:'8px',padding:'16px',marginBottom:'18px',textAlign:'left'}}>
          <div style={{fontSize:'11px',fontWeight:700,color:'#2d8a4e',textTransform:'uppercase',letterSpacing:'1px',marginBottom:'10px'}}>&#x2713; Notifications Dispatched</div>
          <div style={{background:WH,padding:'8px 12px',borderRadius:'5px',border:'1px solid #c3e6cb',marginBottom:'8px',fontSize:'12px'}}>
            <strong style={{background:'#2d8a4e',color:WH,borderRadius:'3px',padding:'1px 6px',fontSize:'9px',marginRight:'8px'}}>EMAIL</strong> Confirmation sent to <strong>{done.contactEmail}</strong>
          </div>
          <div style={{background:WH,padding:'8px 12px',borderRadius:'5px',border:'1px solid #c3e6cb',fontSize:'12px'}}>
            <strong style={{background:'#2d8a4e',color:WH,borderRadius:'3px',padding:'1px 6px',fontSize:'9px',marginRight:'8px'}}>TEXT</strong> Registration # sent to <strong>{done.contactPhone}</strong>
          </div>
        </div>
        <div style={{display:'flex',gap:'12px',justifyContent:'center',flexWrap:'wrap'}}>
          <button style={{...s.btn,background:'linear-gradient(135deg,#1a2b4a,#0d1829)'}} onClick={()=>doSticker(done)}>&#x1F5A8; Print Window Sticker</button>
          <button style={s.btnOut} onClick={()=>setDone(null)}>Register Another</button>
        </div>
      </div>
    </div>
  );
  return (
    <div style={{maxWidth:'860px',margin:'40px auto',padding:'0 24px'}}>
      <div style={{marginBottom:'32px'}}>
        <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'56px',color:NV,letterSpacing:'3px'}}>VEHICLE REGISTRATION</h1>
      </div>
      <form onSubmit={handleSubmit}>
        <div style={{...s.card,marginBottom:'20px'}}>
          <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',color:NV,letterSpacing:'1px',marginBottom:'20px'}}>REGISTRATION TYPE</h3>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px'}}>
            {[{v:'single',l:'Single Weekend',p:25,sub:'One weekend event'},{v:'multi',l:'Show Until It Sells',p:75,sub:'Valid 90 days'}].map(({v,l,p,sub})=>(
              <label key={v} onClick={()=>set('registrationType',v)} style={{border:`2px solid ${form.registrationType===v?CR:'#e0e0e0'}`,borderRadius:'8px',padding:'16px',cursor:'pointer',background:form.registrationType===v?'rgba(157,34,53,0.05)':WH,display:'block'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}}>
                  <span style={{fontWeight:700,color:NV}}>{l}</span>
                  <span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',color:CR}}>${p}</span>
                </div>
                <div style={{fontSize:'11px',color:'#888'}}>{sub}</div>
              </label>
            ))}
          </div>
        </div>
        <div style={{...s.card,marginBottom:'20px'}}>
          <h3 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'22px',color:NV,letterSpacing:'1px',marginBottom:'20px'}}>VEHICLE INFORMATION</h3>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:'16px',marginBottom:'16px'}}>
            <div><label style={s.label}>Vehicle Type *</label>
              <select value={form.vehicleType} onChange={e=>set('vehicleType',e.target.value)} style={sel} required>
                <option value="">-- Select Type --</option>
                {VTYPES.map(t=><option key={t} value={t}>{t}</option>)}
              </select>
            </div>
            <div><label style={s.label}>Year *</label>
              <select value={form.year} onChange={e=>set('year',e.target.value)} style={sel} required>
                <option value="">-- Select Year --</option>
                {YLIST.map(y=><option key={y} value={y}>{y}</option>)}
              </select>
            </div>
            <div><label style={s.label}>Make *</label>
              <select value={form.make} onChange={e=>handleMake(e.target.value)} style={sel} required>
                {ALL_MAKES.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              {form.make==='Other'&&<input value={form.makeOther} onChange={e=>set('makeOther',e.target.value)} placeholder="Enter make..." style={{...s.input,marginTop:'8px'}} required/>}
            </div>
            <div><label style={s.label}>Model *</label>
              <select value={form.model} onChange={e=>set('model',e.target.value)} style={{...sel,opacity:(!form.make||form.make==='-- Select Make --')?0.5:1}} required disabled={!form.make||form.make==='-- Select Make --'}>
                {avModels.map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              {form.model==='Other'&&<input value={form.modelOther} onChange={e=>set('modelOther',e.target.value)} placeholder="Enter model..." style={{...s.input,marginTop:'8px'}} required/>}
            </div>
            <div><label style={s.label}>Trim</label><input value={form.trim} onChange={e=>set('trim',e.target.value)} placeholder="GT, LTZ, TRD..." style={s.input}/></div>
            <div><label style={s.label}>VIN / Serial *</label><input value={form.vin} onChange={e=>set('vin',e.target.value)} placeholder="17-character VIN" style={s.input} required/></div>

            <label style={{...s.label,marginBottom:'12px'}}>Access &amp; Contact Preferences</label>

                  <span style={{fontSize:'12px',fontWeight:600,color:form[k]?CR:NV}}>{l}</span>

// REPORTS
function ReportsPage({vehicles}) {
  const weeks=[...new Set(vehicles.map(v=>v.weekNumber))].sort((a,b)=>a-b);
  const types=[...new Set(vehicles.map(v=>v.vehicleType))].sort();
  const weekSummary=weeks.map(w=>{const wv=vehicles.filter(v=>v.weekNumber===w);const sg=wv.filter(v=>v.registrationType==='single');const mu=wv.filter(v=>v.registrationType==='multi');return{week:w,total:wv.length,single:sg.length,multi:mu.length,fees:sg.length*25+mu.length*75,sold:wv.filter(v=>v.status==='sold').length,avgP:wv.length?Math.round(wv.reduce((s,v)=>s+(v.price||0),0)/wv.length):0};});
  const typeSummary=types.map(t=>{const tv=vehicles.filter(v=>v.vehicleType===t);return{type:t,count:tv.length,pct:Math.round(tv.length/vehicles.length*100),active:tv.filter(v=>getStatus(v).l==='ACTIVE').length,avgP:tv.length?Math.round(tv.reduce((s,v)=>s+(v.price||0),0)/tv.length):0};}).sort((a,b)=>b.count-a.count);
  const totalFees=weekSummary.reduce((s,w)=>s+w.fees,0);
  const topListings=[...vehicles].sort((a,b)=>(b.price||0)-(a.price||0)).slice(0,8);
  return (
    <div style={{flex:1,overflowY:'auto',padding:'28px',background:'#0d1829'}}>

          <h1 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'32px',color:WH,letterSpacing:'2px'}}>REPORTS & ANALYTICS</h1>
          <p style={{color:'#555',fontSize:'12px',marginTop:'4px'}}>{vehicles.length} total registrations</p>
        </div>
        <button style={{...s.btn,padding:'9px 18px',fontSize:'12px'}} onClick={()=>csvExport(vehicles)}>⬇ Full Export</button>

// MAIN APP
const ADMIN_VIEWS = ['dashboard','manifest','reports'];

function App() {
  const [view,setView] = useState('home');
  const [vehicles,setVehicles] = useState(SEED);
  const [auth,setAuth] = useState(null);
  const [showLogin,setShowLogin] = useState(false);

  const nav = v => {
    if(ADMIN_VIEWS.includes(v)&&!auth){setShowLogin(true);return;}
    setView(v);setShowLogin(false);
  };
  const handleLogin = user => {setAuth(user);setShowLogin(false);setView('dashboard');};
  const handleLogout = () => {setAuth(null);setView('home');};
  const isAdmin = auth && ADMIN_VIEWS.includes(view);

  return (
    <div style={{minHeight:'100vh',background:GR}}>
      <Header view={view} nav={nav} auth={auth} onLogin={()=>setShowLogin(true)} onLogout={handleLogout}/>
      {isAdmin ? (
        <div style={{display:'flex',height:'calc(100vh - 60px)',overflow:'hidden'}}>
          <AdminSidebar view={view} nav={nav} auth={auth} onLogout={handleLogout}/>
          {view==='dashboard'&&<DashboardPage vehicles={vehicles}/>}
          {view==='manifest'&&<ManifestPage vehicles={vehicles} setVehicles={setVehicles}/>}
          {view==='reports'&&<ReportsPage vehicles={vehicles}/>}
        </div>
      ):(
        <div key={view}>
          {view==='home'&&<HomePage nav={nav} vehicles={vehicles}/>}
          {view==='register'&&<RegisterPage setVehicles={setVehicles} nav={nav}/>}
          {view==='how-it-works'&&<HowItWorksPage/>}
          {view==='location'&&<LocationPage/>}
          {view==='faqs'&&<FAQsPage/>}
          {view==='contact'&&<ContactPage/>}
        </div>
      )}
      {showLogin&&<LoginModal onClose={()=>setShowLogin(false)} onLogin={handleLogin}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
